    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",

    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #network {
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      gap: 10px;
      z-index: 20;
      align-items: center;
      pointer-events: none;
    }

    .topbar-inner {
      display: flex;
      gap: 10px;
      align-items: center;
      pointer-events: auto;
      flex-wrap: wrap;
    }

    .search {
      width: min(320px, 72vw);
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(10, 14, 28, 0.74);
      color: #fff;
      backdrop-filter: blur(10px);
      outline: none;
      font-size: 15px;
    }

    .search::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.16);
    }

    .legend {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 230px;
      z-index: 20;
      padding: 16px;
      border-radius: 20px;
      background: rgba(8, 12, 26, 0.78);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    .legend h3 {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.82);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      font-size: 14px;
      color: rgba(255,255,255,0.88);
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
      flex-shrink: 0;
    }

    .panel {
      position: absolute;
      top: 84px;
      right: 16px;
      bottom: 16px;
      width: min(370px, calc(100vw - 32px));
      z-index: 25;
      padding: 18px;
      border-radius: 22px;
      background: rgba(8, 12, 26, 0.85);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.42);
      overflow-y: auto;
      transform: translateX(0);
      transition: 0.28s ease;
    }

    .panel.hidden {
      transform: translateX(calc(100% + 20px));
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
    }

    .en-name {
      margin-bottom: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.62);
    }

    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
    }

      margin-top: 18px;
    }

    .section h4 {
      margin: 0 0 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.84);
    }

      color: rgba(255,255,255,0.85);
      line-height: 1.75;
      font-size: 14px;
    }

      margin: 0;
      padding-left: 18px;
    }

      display: inline-block;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;

      box-shadow: 0 10px 30px rgba(112, 103, 255, 0.25);
    }

    .hint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(8, 12, 26, 0.65);
      border: 1px solid rgba(255,255,255,0.08);

      color: rgba(255,255,255,0.74);

      color: rgba(255,255,255,0.72);
      line-height: 1.8;
      font-size: 14px;
      margin-top: 8px;
    }

      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

      .legend {
        width: 180px;
        padding: 12px;
        top: 70px;
      }

      .panel {
        top: auto;
        right: 10px;
        left: 10px;
        bottom: 10px;
        width: auto;
        max-height: 52vh;
      }

      .hint {
        right: 16px;
        max-width: 72vw;

</head>

    <div id="network"></div>

    <div class="hint">

      ["conservatism", "nationalism"],
      ["marxism", "socialism"],
      ["marxism", "anarchism"],
      ["marxism", "critical_theory"],
      ["socialism", "anarchism"],
      ["rationalism", "empiricism"],
      ["empiricism", "positivism"],
      ["positivism", "utilitarianism"],
      ["phenomenology", "existentialism"],
      ["existentialism", "nihilism"],
      ["existentialism", "humanism"],
      ["stoicism", "utilitarianism"],
      ["structuralism", "postmodernism"],
      ["structuralism", "deconstruction"],
      ["postmodernism", "deconstruction"],
      ["critical_theory", "postmodernism"],
      ["phenomenology", "structuralism"]
    ];

    const nodeData = ideas.map(item => ({
      id: item.id,
      label: item.label,
      title: item.label,
      value: item.size,
      color: {
        background: item.color,
        border: item.color,
        highlight: {
          background: item.color,
          border: "#ffffff"
        },
        hover: {
          background: item.color,
          border: "#ffffff"
        }
      },
      font: {
        color: "#ffffff",
        size: 16,
        face: "sans-serif",
        strokeWidth: 0
      },
      shape: "dot",
      shadow: {
        enabled: true,
        color: item.color,
        size: 22,
        x: 0,
        y: 0
      }
    }));

    const edgeData = relationPairs.map(([from, to]) => ({
      from,
      to,
      color: {
        color: "rgba(255,255,255,0.10)",
        highlight: "rgba(255,255,255,0.35)",
        hover: "rgba(255,255,255,0.25)"
      },
      width: 1,
      smooth: {
        enabled: true,
        type: "dynamic"
      }
    }));

    const container = document.getElementById("network");
    const nodes = new vis.DataSet(nodeData);
    const edges = new vis.DataSet(edgeData);

    const data = { nodes, edges };

    const options = {
      autoResize: true,
      interaction: {
        hover: true,
        tooltipDelay: 120,
        zoomView: true,
        dragView: true,
        navigationButtons: false
      },
      physics: {
        enabled: true,
        stabilization: {
          iterations: 300
        },
        barnesHut: {
          gravitationalConstant: -1800,
          centralGravity: 0.12,
          springLength: 150,
          springConstant: 0.02,
          damping: 0.9,
          avoidOverlap: 0.4
        }
      },
      nodes: {
        borderWidth: 0,
        scaling: {
          min: 10,
          max: 36
        }
      },
      edges: {
        selectionWidth: 2
      }
    };

    const network = new vis.Network(container, data, options);

    const panel = document.getElementById("panel");
    const panelContent = document.getElementById("panelContent");
    const closePanelBtn = document.getElementById("closePanelBtn");
    const searchInput = document.getElementById("searchInput");
    const resetViewBtn = document.getElementById("resetViewBtn");
    const randomBtn = document.getElementById("randomBtn");

    function renderPanel(item) {
      panelContent.innerHTML = `
        <h2>${item.label}</h2>
        <div class="en-name">${item.english}</div>
        <div class="tag">${item.category}</div>

        <div class="section">
          <h4>简介</h4>
          <p>${item.summary}</p>
        </div>

        <div class="section">
          <h4>代表人物</h4>
          <ul>
            ${item.figures.map(name => `<li>${name}</li>`).join("")}
          </ul>
        </div>

        <div class="section">
          <h4>代表书籍</h4>
          <ul>
            ${item.books.map(book => `<li>${book}</li>`).join("")}
          </ul>
        </div>

        <div class="section">
          <h4>相关思想</h4>
          <ul>
            ${item.related.map(r => `<li>${r}</li>`).join("")}
          </ul>
        </div>

        <a class="wiki-btn" href="${item.wiki}" target="_blank" rel="noopener noreferrer">
          打开维基百科
        </a>
      `;

      panel.classList.remove("hidden");
    }

    function showWelcomePanel() {
      panelContent.innerHTML = `
        <h2>思想宇宙图谱</h2>
        <div class="en-name">Ideology & Philosophy Map</div>
        <div class="tag">点击任意节点开始探索</div>

        <div class="empty">
          这里的每一个光点，代表一种主义或哲学思想。<br><br>
          你可以：
          <br>· 点击光点查看简介
          <br>· 查看代表人物和书籍
          <br>· 点击按钮跳转维基百科
          <br>· 用搜索框快速定位某个思想
        </div>
      `;
      panel.classList.remove("hidden");
    }

    function openIdeaById(id) {
      const item = ideas.find(x => x.id === id);
      if (!item) return;

      renderPanel(item);

      network.selectNodes([id]);
      network.focus(id, {
        scale: 1.15,
        animation: {
          duration: 600,
          easingFunction: "easeInOutQuad"
        }
      });

      highlightNeighborhood(id);
    }

    function clearHighlight() {
      nodes.update(ideas.map(item => ({
        id: item.id,
        color: {
          background: item.color,
          border: item.color,
          highlight: {
            background: item.color,
            border: "#ffffff"
          },
          hover: {
            background: item.color,
            border: "#ffffff"
          }
        },
        font: { color: "#ffffff", size: 16 },
        shadow: {
          enabled: true,
          color: item.color,
          size: 22,
          x: 0,
          y: 0
        }
      })));

      edges.update(edgeData.map((e, index) => ({
        id: index + 1,
        ...e
      })));
    }

    function highlightNeighborhood(selectedId) {
      const connected = new Set(network.getConnectedNodes(selectedId));
      connected.add(selectedId);

      nodes.update(ideas.map(item => {
        const active = connected.has(item.id);
        return {
          id: item.id,
          color: {
            background: active ? item.color : "rgba(255,255,255,0.14)",
            border: active ? item.color : "rgba(255,255,255,0.08)"
          },
          font: {
            color: active ? "#ffffff" : "rgba(255,255,255,0.35)",
            size: active ? 16 : 14
          },
          shadow: {
            enabled: active,
            color: item.color,
            size: active ? 26 : 0,
            x: 0,
            y: 0
          }
        };
      }));

      const connectedEdges = network.getConnectedEdges(selectedId);
      edges.forEach(edge => {
        const active = connectedEdges.includes(edge.id);
        edges.update({
          id: edge.id,
          color: {
            color: active ? "rgba(255,255,255,0.35)" : "rgba(255,255,255,0.05)"
          },
          width: active ? 2 : 1
        });
      });
    }

    network.on("click", function(params) {
      if (params.nodes.length > 0) {
        openIdeaById(params.nodes[0]);
      } else {
        clearHighlight();
      }
    });

    closePanelBtn.addEventListener("click", () => {
      panel.classList.add("hidden");
      network.unselectAll();
      clearHighlight();
    });

    resetViewBtn.addEventListener("click", () => {
      network.fit({
        animation: {
          duration: 700,
          easingFunction: "easeInOutQuad"
        }
      });
      network.unselectAll();
      clearHighlight();
    });

    randomBtn.addEventListener("click", () => {
      const random = ideas[Math.floor(Math.random() * ideas.length)];
      openIdeaById(random.id);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;

      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) return;

      const found = ideas.find(item =>
        item.label.toLowerCase().includes(keyword) ||
        item.english.toLowerCase().includes(keyword) ||
        item.figures.some(name => name.toLowerCase().includes(keyword))
      );

      if (found) {
        openIdeaById(found.id);
      } else {
        panelContent.innerHTML = `
          <h2>没有找到</h2>
          <div class="en-name">Search Result</div>
          <div class="empty">
            没有搜到“${searchInput.value}”。<br><br>
            你可以试试：
            <br>· 存在主义
            <br>· 马克思主义
            <br>· 自由主义
            <br>· 斯多葛主义
          </div>
        `;
        panel.classList.remove("hidden");
      }
    });

    network.once("stabilizationIterationsDone", function () {
      network.fit({
        animation: {
          duration: 900,
          easingFunction: "easeInOutQuad"
        }
      });
      showWelcomePanel();
    });
  </script>
</body>
</html>
