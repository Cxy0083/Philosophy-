<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(115, 130, 255, 0.16), transparent 22%),
        radial-gradient(circle at 80% 18%, rgba(255, 120, 210, 0.12), transparent 22%),
        radial-gradient(circle at 50% 75%, rgba(120, 255, 220, 0.10), transparent 25%),
        linear-gradient(180deg, #040712 0%, #050913 40%, #02040b 100%);
      color: #fff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 120px 180px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 240px 90px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 340px 240px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 80px 260px, rgba(255,255,255,0.5), transparent);
      background-size: 400px 300px;
      opacity: 0.22;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #network {
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 14px;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      pointer-events: auto;
      max-width: 70vw;
    }

    .search,
    .select,
    .btn {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(9, 14, 28, 0.78);
      color: #fff;
      backdrop-filter: blur(10px);
      border-radius: 16px;
      font-size: 14px;
    }

    .search {
      width: min(330px, 72vw);
      padding: 12px 14px;
      outline: none;
    }

    .search::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .select {
      padding: 12px 14px;
      outline: none;
    }

    .btn {
      padding: 12px 14px;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .legend {
      width: 240px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(9, 14, 28, 0.82);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 48px rgba(0,0,0,0.34);
      pointer-events: auto;
    }

    .legend-title {
      font-size: 13px;
      color: rgba(255,255,255,0.74);
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 9px 0;
      font-size: 14px;
      color: rgba(255,255,255,0.88);
    }

    .legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 14px currentColor;
    }

    .panel {
      position: absolute;
      right: 16px;
      top: 105px;
      bottom: 16px;
      width: min(390px, calc(100vw - 32px));
      z-index: 40;
      background: rgba(9, 14, 28, 0.88);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 60px rgba(0,0,0,0.42);
      border-radius: 24px;
      overflow: hidden;
      transition: 0.28s ease;
    }

    .panel.hidden {
      transform: translateX(calc(100% + 24px));
    }

    .panel-scroll {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 18px;
    }

    .close-btn {
      position: absolute;
      right: 14px;
      top: 14px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      color: #fff;
      z-index: 2;
      font-size: 18px;
    }

    .title {
      font-size: 28px;
      line-height: 1.12;
      margin: 4px 42px 6px 0;
      font-weight: 700;
    }

    .subtitle {
      color: rgba(255,255,255,0.58);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.86);
      font-size: 12px;
      margin-bottom: 14px;
    }

    .section {
      margin-top: 18px;
    }

    .section h4 {
      margin: 0 0 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }

    .section p,
    .section li {
      font-size: 14px;
      line-height: 1.75;
      color: rgba(255,255,255,0.84);
    }

    .section ul {
      margin: 0;
      padding-left: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 12px;
      color: rgba(255,255,255,0.88);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .chip:hover {
      background: rgba(255,255,255,0.12);
    }

    .wiki-summary {
      min-height: 60px;
      white-space: pre-line;
    }

    .loading {
      color: rgba(255,255,255,0.6);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .link-btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(135deg, rgba(90,120,255,0.88), rgba(211,96,255,0.88));
      box-shadow: 0 10px 30px rgba(110,90,255,0.24);
      font-size: 14px;
    }

    .muted-btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 14px;
      color: #fff;
      background: rgba(255,255,255,0.08);
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 15;
      background: rgba(9, 14, 28, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.72);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
    }

    .welcome {
      color: rgba(255,255,255,0.82);
      line-height: 1.8;
      font-size: 14px;
    }

    .empty-text {
      color: rgba(255,255,255,0.64);
      font-size: 14px;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        max-width: 100%;
      }

      .legend {
        width: 100%;
      }

      .panel {
        left: 10px;
        right: 10px;
        width: auto;
        top: auto;
        bottom: 10px;
        max-height: 56vh;
      }

      .hint {
        max-width: calc(100vw - 32px);
      }
    }
  </style>
</head>

  <div id="app">

      <div class="controls">

        <button id="resetBtn" class="btn">重置视图</button>
        <button id="randomBtn" class="btn">随机思想</button>
      </div>

      <div class="legend">

        <div class="legend-item">

        <div class="legend-item">

        <div class="legend-item">
          <span class="legend-dot" style="background:#ffb3d5;color:#ffb3d5;"></span>
          <span>文化 / 批判理论</span>
        </div>
      </div>
    </div>

    <div id="panel" class="panel hidden">
      <button id="closePanelBtn" class="close-btn">×</button>
      <div class="panel-scroll" id="panelContent"></div>
    </div>

    <div id="network"></div>

    <div class="hint">拖动画布、双指缩放、点击节点查看详细资料</div>
  </div>

        color: "#a7ffbd",
        size: 24,
        wikiTitle: "斯多葛学派",
        wikiUrl: "https://zh.wikipedia.org/wiki/斯多葛学派",
        summary: "强调理性、自制、德性与对不可控事物的平静接受，是一种强实践性的生活哲学。",
        figures: ["芝诺", "塞涅卡", "爱比克泰德", "马可·奥勒留"],
        books: ["《沉思录》", "《道德书简》"],
        related: ["犬儒主义", "功利主义"]
      },
      {
        id: "utilitarianism",
        label: "功利主义",
        english: "Utilitarianism",
        category: "伦理 / 实践哲学",
        color: "#a7ffbd",
        size: 24,
        wikiTitle: "功利主义",
        wikiUrl: "https://zh.wikipedia.org/wiki/功利主义",
        summary: "以最大多数人的最大幸福作为判断行为与制度的一个核心标准。",
        figures: ["边沁", "密尔"],
        books: ["《道德与立法原理导论》", "《功利主义》"],
        related: ["自由主义", "实证主义"]
      },
      {
        id: "humanism",
        label: "人本主义",
        english: "Humanism",
        category: "伦理 / 实践哲学",
        color: "#a7ffbd",
        size: 22,
        wikiTitle: "人文主义",
        wikiUrl: "https://zh.wikipedia.org/wiki/人文主义",
        summary: "强调人的价值、尊严与自我实现潜能，在教育、文艺和心理学中影响广泛。",
        figures: ["伊拉斯谟", "马斯洛", "罗杰斯"],
        books: ["《论人的尊严》", "《动机与人格》"],
        related: ["存在主义", "自由主义"]
      },
      {
        id: "virtue_ethics",
        label: "德性伦理学",
        english: "Virtue Ethics",
        category: "伦理 / 实践哲学",
        color: "#a7ffbd",
        size: 21,
        wikiTitle: "德性伦理学",
        wikiUrl: "https://zh.wikipedia.org/wiki/德性伦理学",
        summary: "将道德重点放在人的品格与德性养成，而不只是规则或结果。",
        figures: ["亚里士多德", "麦金太尔"],
        books: ["《尼各马可伦理学》", "《德性之后》"],
        related: ["斯多葛主义", "人本主义"]
      },
      {
        id: "cynicism",
        label: "犬儒主义",
        english: "Cynicism",
        category: "伦理 / 实践哲学",
        color: "#a7ffbd",
        size: 18,
        wikiTitle: "犬儒學派",
        wikiUrl: "https://zh.wikipedia.org/wiki/犬儒學派",
        summary: "古典犬儒学派强调简朴生活、藐视虚伪习俗和回归自然；现代语境常另有贬义。",
        figures: ["第欧根尼"],
        books: ["《名哲言行录》（相关记载）"],
        related: ["斯多葛主义"]
      },

      {
        id: "structuralism",
        label: "结构主义",
        english: "Structuralism",
        category: "文化 / 批判理论",
        color: "#ffb3d5",
        size: 23,
        wikiTitle: "结构主义",
        wikiUrl: "https://zh.wikipedia.org/wiki/结构主义",
        summary: "强调语言、文化与思想背后的深层结构，试图揭示表象背后的规则系统。",
        figures: ["索绪尔", "列维-斯特劳斯", "拉康"],
        books: ["《普通语言学教程》", "《野性的思维》"],
        related: ["后现代主义", "解构主义"]
      },
      {
        id: "postmodernism",
        label: "后现代主义",
        english: "Postmodernism",
        category: "文化 / 批判理论",
        color: "#ffb3d5",
        size: 25,
        wikiTitle: "后现代主义",
        wikiUrl: "https://zh.wikipedia.org/wiki/后现代主义",
        summary: "质疑宏大叙事、中心权威和单一真理，关注差异、多元与话语建构。",
        figures: ["利奥塔", "福柯", "鲍德里亚", "德里达"],
        books: ["《后现代状况》", "《规训与惩罚》", "《拟像与仿真》"],
        related: ["结构主义", "解构主义", "虚无主义"]
      },
      {
        id: "deconstruction",
        label: "解构主义",
        english: "Deconstruction",
        category: "文化 / 批判理论",
        color: "#ffb3d5",
        size: 21,
        wikiTitle: "解构主义",
        wikiUrl: "https://zh.wikipedia.org/wiki/解构主义",
        summary: "通过细读文本揭示其中的张力、二元对立与意义的不稳定性。",
        figures: ["德里达"],
        books: ["《论文字学》", "《书写与差异》"],
        related: ["后现代主义", "结构主义"]
      },
      {
        id: "critical_theory",
        label: "批判理论",
        english: "Critical Theory",
        category: "文化 / 批判理论",
        color: "#ffb3d5",
        size: 24,
        wikiTitle: "批判理论",
        wikiUrl: "https://zh.wikipedia.org/wiki/批判理论",
        summary: "关注权力、意识形态、资本主义社会结构与文化工业，对现代社会进行反思性批判。",
        figures: ["霍克海默", "阿多诺", "马尔库塞", "哈贝马斯"],
        books: ["《启蒙辩证法》", "《单向度的人》", "《交往行为理论》"],
        related: ["马克思主义", "后现代主义"]
      },
      {
        id: "feminism",
        label: "女性主义",
        english: "Feminism",
        category: "文化 / 批判理论",
        color: "#ffb3d5",
        size: 24,
        wikiTitle: "女性主义",
        wikiUrl: "https://zh.wikipedia.org/wiki/女性主义",
        summary: "关注性别权力关系、平等权利与女性经验，是现代社会理论与实践中的重要传统。",
        figures: ["西蒙娜·德·波伏娃", "朱迪斯·巴特勒", "贝蒂·弗里丹"],
        books: ["《第二性》", "《性别麻烦》", "《女性的奥秘》"],
        related: ["后现代主义", "批判理论", "存在主义"]
      }
    ];

    const relationPairs = [
      ["liberalism", "conservatism"],
      ["liberalism", "utilitarianism"],
      ["liberalism", "humanism"],
      ["liberalism", "communitarianism"],
      ["conservatism", "nationalism"],
      ["conservatism", "communitarianism"],
      ["marxism", "socialism"],
      ["marxism", "anarchism"],
      ["marxism", "critical_theory"],
      ["socialism", "anarchism"],
      ["rationalism", "empiricism"],
      ["empiricism", "positivism"],
      ["positivism", "logical_positivism"],
      ["logical_positivism", "analytic_philosophy"],
      ["phenomenology", "existentialism"],
      ["phenomenology", "hermeneutics"],
      ["existentialism", "nihilism"],
      ["existentialism", "absurdism"],
      ["existentialism", "humanism"],
      ["stoicism", "virtue_ethics"],
      ["stoicism", "cynicism"],
      ["utilitarianism", "liberalism"],
      ["humanism", "virtue_ethics"],
      ["structuralism", "postmodernism"],
      ["structuralism", "deconstruction"],
      ["postmodernism", "deconstruction"],
      ["critical_theory", "postmodernism"],
      ["feminism", "critical_theory"],
      ["feminism", "existentialism"],
      ["feminism", "postmodernism"]
    ];

    let currentIdeas = [...ideas];
    let currentSelectedId = null;

    const originalNodeMap = new Map(
      ideas.map(item => [
        item.id,
        {
          id: item.id,
          label: item.label,
          title: item.label,
          value: item.size,
          shape: "dot",
          color: {
            background: item.color,
            border: item.color,
            highlight: { background: item.color, border: "#ffffff" },
            hover: { background: item.color, border: "#ffffff" }
          },
          font: {
            color: "#ffffff",
            size: 15,
            face: "sans-serif"
          },
          shadow: {
            enabled: true,
            color: item.color,
            size: 24,
            x: 0,
            y: 0
          }
        }
      ])
    );

    const nodeData = ideas.map(item => originalNodeMap.get(item.id));

    const edgeData = relationPairs.map((pair, index) => ({
      id: index + 1,
      from: pair[0],
      to: pair[1],
      color: {
        color: "rgba(255,255,255,0.08)",
        highlight: "rgba(255,255,255,0.34)",
        hover: "rgba(255,255,255,0.24)"
      },
      width: 1,
      smooth: {
        enabled: true,
        type: "dynamic"
      }
    }));

    const nodes = new vis.DataSet(nodeData);
    const edges = new vis.DataSet(edgeData);

    const data = { nodes, edges };

    const options = {
      autoResize: true,
      interaction: {
        hover: true,
        zoomView: true,
        dragView: true,
        tooltipDelay: 100
      },
      physics: {
        enabled: true,
        solver: "barnesHut",
        stabilization: { iterations: 350 },
        barnesHut: {
          gravitationalConstant: -2100,
          centralGravity: 0.12,
          springLength: 140,
          springConstant: 0.022,
          damping: 0.88,
          avoidOverlap: 0.38
        }
      },
      nodes: {
        borderWidth: 0,
        scaling: { min: 10, max: 38 }
      },
      edges: {
        selectionWidth: 2
      }
    };

    const network = new vis.Network(document.getElementById("network"), data, options);

    const panel = document.getElementById("panel");
    const panelContent = document.getElementById("panelContent");
    const closePanelBtn = document.getElementById("closePanelBtn");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const resetBtn = document.getElementById("resetBtn");
    const randomBtn = document.getElementById("randomBtn");

    function getIdeaById(id) {
      return ideas.find(item => item.id === id);
    }

    function getIdeaByLabel(label) {
      return ideas.find(item => item.label === label);
    }

    function renderWelcome() {
      panelContent.innerHTML = `
        <div class="title">思想宇宙图谱</div>
        <div class="subtitle">Philosophy Cosmos</div>
        <div class="badge">点击任意节点开始探索</div>

        <div class="welcome">
          每一个光点代表一种主义、流派或哲学思想。<br><br>
          你可以：
          <br>· 点击光点查看简介、代表人物、代表书籍
          <br>· 读取维基百科摘要
          <br>· 搜索某个思想或哲学家
          <br>· 按类别筛选不同思想宇宙
        </div>
      `;
      panel.classList.remove("hidden");
    }

    async function fetchWikiSummary(title) {
      try {
        const url = `https://zh.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("wiki fetch failed");
        }
        const data = await response.json();
        return {
          extract: data.extract || "暂无维基摘要。",
          thumbnail: data.thumbnail?.source || ""
        };
      } catch (error) {
        return {
          extract: "暂时无法自动加载维基摘要，你仍然可以点击下方按钮打开维基百科原文。",
          thumbnail: ""
        };
      }
    }

    function renderRelatedChips(relatedNames) {
      return `
        <div class="chips">
          ${relatedNames.map(name => `<span class="chip" data-related="${name}">${name}</span>`).join("")}
        </div>
      `;
    }

    async function renderIdeaPanel(item) {
      currentSelectedId = item.id;
      panel.classList.remove("hidden");

      panelContent.innerHTML = `
        <div class="title">${item.label}</div>
        <div class="subtitle">${item.english}</div>
        <div class="badge">${item.category}</div>

        <div class="section">
          <h4>简介</h4>
          <p>${item.summary}</p>
        </div>

        <div class="section">
          <h4>维基百科摘要</h4>
          <p class="wiki-summary loading">正在加载维基百科摘要…</p>
        </div>

        <div class="section">
          <h4>代表人物</h4>
          <ul>
            ${item.figures.map(name => `<li>${name}</li>`).join("")}
          </ul>
        </div>

        <div class="section">
          <h4>代表书籍</h4>
          <ul>
            ${item.books.map(book => `<li>${book}</li>`).join("")}
          </ul>
        </div>

        <div class="section">
          <h4>相关思想</h4>
          ${renderRelatedChips(item.related)}
        </div>

        <div class="actions">
          <a class="link-btn" href="${item.wikiUrl}" target="_blank" rel="noopener noreferrer">打开维基百科</a>
          <a class="muted-btn" href="https://zh.wikipedia.org/wiki/${encodeURIComponent(item.wikiTitle)}" target="_blank" rel="noopener noreferrer">新窗口查看条目</a>
        </div>
      `;

      const wikiSummaryEl = panelContent.querySelector(".wiki-summary");
      const wikiData = await fetchWikiSummary(item.wikiTitle);

      if (currentSelectedId === item.id && wikiSummaryEl) {
        wikiSummaryEl.classList.remove("loading");
        wikiSummaryEl.textContent = wikiData.extract;
      }

      bindRelatedChips();
    }

    function bindRelatedChips() {
      const chips = panelContent.querySelectorAll(".chip");
      chips.forEach(chip => {
        chip.addEventListener("click", () => {
          const name = chip.getAttribute("data-related");
          const found = getIdeaByLabel(name);
          if (found) {
            openIdea(found.id);
          }
        });
      });
    }

    function resetNodeStyles() {
      ideas.forEach(item => {
        nodes.update({
          ...originalNodeMap.get(item.id),
          hidden: false
        });
      });

      edgeData.forEach(edge => {
        edges.update({
          id: edge.id,
          hidden: false,
          width: 1,
          color: {
            color: "rgba(255,255,255,0.08)",
            highlight: "rgba(255,255,255,0.34)",
            hover: "rgba(255,255,255,0.24)"
          }
        });
      });
    }

    function highlightNeighborhood(id) {
      const connectedNodes = new Set(network.getConnectedNodes(id));
      connectedNodes.add(id);
      const connectedEdges = new Set(network.getConnectedEdges(id));

      ideas.forEach(item => {
        const active = connectedNodes.has(item.id);
        nodes.update({
          id: item.id,
          color: {
            background: active ? item.color : "rgba(255,255,255,0.12)",
            border: active ? item.color : "rgba(255,255,255,0.06)"
          },
          font: {
            color: active ? "#ffffff" : "rgba(255,255,255,0.3)",
            size: active ? 15 : 13
          },
          shadow: {
            enabled: active,
            color: item.color,
            size: active ? 26 : 0,
            x: 0,
            y: 0
          }
        });
      });

      edgeData.forEach(edge => {
        const active = connectedEdges.has(edge.id);
        edges.update({
          id: edge.id,
          width: active ? 2 : 1,
          color: {
            color: active ? "rgba(255,255,255,0.30)" : "rgba(255,255,255,0.04)"
          }
        });
      });
    }

    function openIdea(id) {
      const item = getIdeaById(id);
      if (!item) return;

      currentSelectedId = id;
      renderIdeaPanel(item);
      network.selectNodes([id]);
      network.focus(id, {
        scale: 1.12,
        animation: {
          duration: 600,
          easingFunction: "easeInOutQuad"
        }
      });
      highlightNeighborhood(id);
    }

    function applyCategoryFilter() {
      const value = categoryFilter.value;
      resetNodeStyles();

      if (value === "全部") {
        ideas.forEach(item => nodes.update({ id: item.id, hidden: false }));
        edgeData.forEach(edge => edges.update({ id: edge.id, hidden: false }));
        currentIdeas = [...ideas];
      } else {
        currentIdeas = ideas.filter(item => item.category === value);
        const visibleIds = new Set(currentIdeas.map(item => item.id));

        ideas.forEach(item => {
          nodes.update({
            id: item.id,
            hidden: !visibleIds.has(item.id)
          });
        });

        edgeData.forEach(edge => {
          const visible = visibleIds.has(edge.from) && visibleIds.has(edge.to);
          edges.update({
            id: edge.id,
            hidden: !visible
          });
        });
      }

      network.fit({
        animation: {
          duration: 700,
          easingFunction: "easeInOutQuad"
        }
      });
    }

    function searchIdea() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) return;

      const found = ideas.find(item =>
        item.label.toLowerCase().includes(keyword) ||
        item.english.toLowerCase().includes(keyword) ||
        item.category.toLowerCase().includes(keyword) ||
        item.figures.some(name => name.toLowerCase().includes(keyword)) ||
        item.books.some(book => book.toLowerCase().includes(keyword))
      );

      if (found) {
        categoryFilter.value = "全部";
        applyCategoryFilter();
        setTimeout(() => openIdea(found.id), 150);
      } else {
        panel.classList.remove("hidden");
        panelContent.innerHTML = `
          <div class="title">没有找到</div>
          <div class="subtitle">Search Result</div>
          <div class="empty-text">
            没有搜到 “${searchInput.value}”。<br><br>
            可以试试这些关键词：
            <br>· 存在主义
            <br>· 马克思主义
            <br>· 结构主义
            <br>· 女性主义
            <br>· 尼采
            <br>· 《资本论》
          </div>
        `;
      }
    }

    network.on("click", function(params) {
      if (params.nodes.length > 0) {
        openIdea(params.nodes[0]);
      } else {
        resetNodeStyles();
      }
    });

    searchInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        searchIdea();
      }
    });

    categoryFilter.addEventListener("change", applyCategoryFilter);

    resetBtn.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "全部";
      currentSelectedId = null;
      applyCategoryFilter();
      resetNodeStyles();
      network.unselectAll();
      network.fit({
        animation: {
          duration: 800,
          easingFunction: "easeInOutQuad"
        }
      });
      renderWelcome();
    });

    randomBtn.addEventListener("click", () => {
      const list = currentIdeas.length ? currentIdeas : ideas;
      const random = list[Math.floor(Math.random() * list.length)];
      openIdea(random.id);
    });

    closePanelBtn.addEventListener("click", () => {
      panel.classList.add("hidden");
      currentSelectedId = null;
      network.unselectAll();
      resetNodeStyles();
    });

    network.once("stabilizationIterationsDone", function() {
      network.fit({
        animation: {
          duration: 900,
          easingFunction: "easeInOutQuad"
        }
      });
      renderWelcome();
    });
  </script>
</body>
</html>
