<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>思想宇宙图谱</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(90,110,255,0.18), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255,120,200,0.15), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(120,255,220,0.12), transparent 25%),
        linear-gradient(180deg, #050814 0%, #060a18 40%, #03050d 100%);
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #network {
      width: 100%;
      height: 100%;
    }

    .topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .topbar-left, .legend {
      pointer-events: auto;
    }

    .topbar-left {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 70vw;
    }

    .search, .btn, .select {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10, 14, 28, 0.78);
      color: #fff;
      backdrop-filter: blur(10px);
      border-radius: 16px;
      font-size: 14px;
    }

    .search {
      width: min(320px, 72vw);
      padding: 12px 14px;
      outline: none;
    }

    .search::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .btn, .select {
      padding: 12px 14px;
    }

    .btn {
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .legend {
      width: 235px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(8, 12, 26, 0.78);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    .legend h3 {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.82);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      font-size: 14px;
      color: rgba(255,255,255,0.88);
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
      flex-shrink: 0;
    }

    .panel {
      position: absolute;
      top: 96px;
      right: 16px;
      bottom: 16px;
      width: min(390px, calc(100vw - 32px));
      z-index: 25;
      border-radius: 22px;
      background: rgba(8, 12, 26, 0.88);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.42);
      overflow: hidden;
      transition: 0.28s ease;
    }

    .panel.hidden {
      transform: translateX(calc(100% + 20px));
    }

    .panel-scroll {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 18px;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      z-index: 2;
    }

    .title {
      margin: 0 42px 8px 0;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 700;
    }

    .subtitle {
      margin-bottom: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.62);
    }

    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
    }

    .section {
      margin-top: 18px;
    }

    .section h4 {
      margin: 0 0 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }

    .section p, .section li {
      color: rgba(255,255,255,0.85);
      line-height: 1.75;
      font-size: 14px;
    }

    .section ul {
      margin: 0;
      padding-left: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-size: 12px;
      color: rgba(255,255,255,0.88);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .chip:hover {
      background: rgba(255,255,255,0.13);
    }

    .wiki-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, rgba(92, 124, 255, 0.85), rgba(213, 108, 255, 0.85));
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(112, 103, 255, 0.25);
    }

    .wiki-card {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      line-height: 1.7;
    }

    .hint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(8, 12, 26, 0.65);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.74);
      font-size: 13px;
    }

    .empty {
      color: rgba(255,255,255,0.72);
      line-height: 1.8;
      font-size: 14px;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
      }

      .topbar-left {
        max-width: 100%;
      }

      .legend {
        width: 100%;
      }

      .panel {
        top: auto;
        right: 10px;
        left: 10px;
        bottom: 10px;
        width: auto;
        max-height: 56vh;
      }
    }
  </style>
</head>

  <div id="app">

        <button class="btn" id="resetBtn">重置视图</button>

        <div class="legend-item">

        <div class="legend-item">

          <span class="legend-dot" style="color:#ffb3d5;background:#ffb3d5;"></span>
          <span>文化 / 批判理论</span>
        </div>
      </div>
    </div>

    <div id="panel" class="panel hidden">
      <button class="close-btn" id="closePanelBtn">×</button>
      <div id="panelContent" class="panel-scroll"></div>
    </div>

    <div id="network"></div>

    <div class="hint">点击光点查看这个主义的介绍、人物、书籍和维基百科入口</div>

    const relationPairs = [
      ["liberalism", "conservatism"],
      ["liberalism", "utilitarianism"],
      ["liberalism", "humanism"],
      ["liberalism", "communitarianism"],
      ["conservatism", "nationalism"],
      ["conservatism", "communitarianism"],
      ["marxism", "socialism"],
      ["marxism", "anarchism"],
      ["marxism", "critical_theory"],
      ["socialism", "anarchism"],
      ["rationalism", "empiricism"],
      ["empiricism", "positivism"],
      ["positivism", "logical_positivism"],
      ["logical_positivism", "analytic_philosophy"],
      ["phenomenology", "existentialism"],
      ["phenomenology", "hermeneutics"],
      ["existentialism", "nihilism"],
      ["existentialism", "absurdism"],
      ["existentialism", "humanism"],
      ["stoicism", "virtue_ethics"],
      ["stoicism", "cynicism"],
      ["structuralism", "postmodernism"],
      ["structuralism", "deconstruction"],
      ["postmodernism", "deconstruction"],
      ["critical_theory", "postmodernism"],
      ["critical_theory", "feminism"],
      ["feminism", "existentialism"],
      ["feminism", "postmodernism"]
    ];

    const byId = new Map(ideas.map(i => [i.id, i]));
    const byLabel = new Map(ideas.map(i => [i.label, i]));

    const originalNodes = ideas.map(item => ({
      id: item.id,
      label: item.label,
      value: item.size,
      title: item.label,
      shape: "dot",
      color: {
        background: item.color,
        border: item.color,
        highlight: { background: item.color, border: "#ffffff" },
        hover: { background: item.color, border: "#ffffff" }
      },
      font: {
        color: "#ffffff",
        size: 15,
        face: "sans-serif"
      },
      shadow: {
        enabled: true,
        color: item.color,
        size: 22,
        x: 0,
        y: 0
      }
    }));

    const edgeData = relationPairs.map((pair, index) => ({
      id: index + 1,
      from: pair[0],
      to: pair[1],
      color: {
        color: "rgba(255,255,255,0.09)",
        highlight: "rgba(255,255,255,0.34)",
        hover: "rgba(255,255,255,0.24)"
      },
      width: 1,
      smooth: {
        enabled: true,
        type: "dynamic"
      }
    }));

    const nodes = new vis.DataSet(originalNodes);
    const edges = new vis.DataSet(edgeData);

    const network = new vis.Network(
      document.getElementById("network"),
      { nodes, edges },
      {
        autoResize: true,
        interaction: {
          hover: true,
          tooltipDelay: 120,
          zoomView: true,
          dragView: true
        },
        physics: {
          enabled: true,
          stabilization: { iterations: 320 },
          barnesHut: {
            gravitationalConstant: -2000,
            centralGravity: 0.12,
            springLength: 145,
            springConstant: 0.02,
            damping: 0.9,
            avoidOverlap: 0.4
          }
        },
        nodes: {
          borderWidth: 0,
          scaling: { min: 10, max: 38 }
        },
        edges: {
          selectionWidth: 2
        }
      }
    );

    const panel = document.getElementById("panel");
    const panelContent = document.getElementById("panelContent");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const resetBtn = document.getElementById("resetBtn");
    const randomBtn = document.getElementById("randomBtn");
    const closePanelBtn = document.getElementById("closePanelBtn");

    let visibleIds = new Set(ideas.map(i => i.id));

    function renderWelcome() {
      panelContent.innerHTML = `
        <div class="title">思想宇宙图谱</div>
        <div class="subtitle">点击任意光点开始探索</div>
        <div class="tag">哲学思想 / 主义 / 流派</div>

        <div class="empty">
          这版会直接显示这个主义的介绍，不再依赖外部摘要接口。<br><br>
          你点任意节点后会看到：
          <br>· 简介
          <br>· 维基条目风格介绍
          <br>· 代表人物
          <br>· 代表书籍
          <br>· 相关思想
          <br>· 打开维基百科按钮
        </div>
      `;
      panel.classList.remove("hidden");
    }

    function renderRelatedChips(names) {
      return `
        <div class="chips">
          ${names.map(name => `<span class="chip" data-name="${name}">${name}</span>`).join("")}
        </div>
      `;
    }

    function bindChips() {
      panelContent.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const item = byLabel.get(chip.dataset.name);
          if (item) openIdea(item.id);
        });
      });
    }

    function renderPanel(item) {
      panelContent.innerHTML = `
        <div class="title">${item.label}</div>
        <div class="subtitle">${item.english}</div>
        <div class="tag">${item.category}</div>

        <div class="section">
          <h4>简介</h4>
          <p>${item.summary}</p>
        </div>

        <div class="section">
          <h4>维基百科式介绍</h4>
          <div class="wiki-card">${item.wikiIntro}</div>
        </div>

        <div class="section">
          <h4>代表人物</h4>
          <ul>${item.figures.map(name => `<li>${name}</li>`).join("")}</ul>
        </div>

        <div class="section">
          <h4>代表书籍</h4>
          <ul>${item.books.map(book => `<li>${book}</li>`).join("")}</ul>
        </div>

        <div class="section">
          <h4>相关思想</h4>
          ${renderRelatedChips(item.related)}
        </div>

        <a class="wiki-btn" href="${item.wikiUrl}" target="_blank" rel="noopener noreferrer">
          打开维基百科原页面
        </a>
      `;
      panel.classList.remove("hidden");
      bindChips();
    }

    function resetStyles() {
      ideas.forEach(item => {
        nodes.update({
          id: item.id,
          hidden: !visibleIds.has(item.id),
          color: {
            background: item.color,
            border: item.color
          },
          font: {
            color: "#ffffff",
            size: 15
          },
          shadow: {
            enabled: true,
            color: item.color,
            size: 22,
            x: 0,
            y: 0
          }
        });
      });

      edgeData.forEach(edge => {
        const show = visibleIds.has(edge.from) && visibleIds.has(edge.to);
        edges.update({
          id: edge.id,
          hidden: !show,
          width: 1,
          color: { color: "rgba(255,255,255,0.09)" }
        });
      });
    }

    function highlightNeighborhood(selectedId) {
      const connectedNodes = new Set(network.getConnectedNodes(selectedId));
      connectedNodes.add(selectedId);
      const connectedEdges = new Set(network.getConnectedEdges(selectedId));

      ideas.forEach(item => {
        const active = connectedNodes.has(item.id) && visibleIds.has(item.id);
        nodes.update({
          id: item.id,
          color: {
            background: active ? item.color : "rgba(255,255,255,0.12)",
            border: active ? item.color : "rgba(255,255,255,0.06)"
          },
          font: {
            color: active ? "#ffffff" : "rgba(255,255,255,0.30)",
            size: active ? 15 : 13
          },
          shadow: {
            enabled: active,
            color: item.color,
            size: active ? 26 : 0,
            x: 0,
            y: 0
          }
        });
      });

      edgeData.forEach(edge => {
        const show = visibleIds.has(edge.from) && visibleIds.has(edge.to);
        const active = connectedEdges.has(edge.id) && show;
        edges.update({
          id: edge.id,
          hidden: !show,
          width: active ? 2 : 1,
          color: {
            color: active ? "rgba(255,255,255,0.30)" : "rgba(255,255,255,0.04)"
          }
        });
      });
    }

    function openIdea(id) {
      const item = byId.get(id);
      if (!item) return;
      renderPanel(item);
      network.selectNodes([id]);
      network.focus(id, {
        scale: 1.12,
        animation: { duration: 600, easingFunction: "easeInOutQuad" }
      });
      highlightNeighborhood(id);
    }

    function applyFilter() {
      const value = categoryFilter.value;

      if (value === "全部") {
        visibleIds = new Set(ideas.map(i => i.id));
      } else {
        visibleIds = new Set(
          ideas.filter(i => i.category === value).map(i => i.id)
        );
      }

      resetStyles();
      network.fit({
        animation: { duration: 700, easingFunction: "easeInOutQuad" }
      });
    }

    function searchIdea() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) return;

      const found = ideas.find(item =>
        item.label.toLowerCase().includes(keyword) ||
        item.english.toLowerCase().includes(keyword) ||
        item.figures.some(name => name.toLowerCase().includes(keyword)) ||
        item.books.some(book => book.toLowerCase().includes(keyword))
      );

      if (found) {
        categoryFilter.value = "全部";
        applyFilter();
        setTimeout(() => openIdea(found.id), 120);
      } else {
        panelContent.innerHTML = `
          <div class="title">没有找到</div>
          <div class="subtitle">Search Result</div>
          <div class="empty">
            没有搜到“${searchInput.value}”。<br><br>
            你可以试试：
            <br>· 存在主义
            <br>· 马克思主义
            <br>· 女性主义
            <br>· 尼采
            <br>· 《资本论》
          </div>
        `;
        panel.classList.remove("hidden");
      }
    }

    network.on("click", function(params) {
      if (params.nodes.length > 0) {
        openIdea(params.nodes[0]);
      } else {
        resetStyles();
      }
    });

    searchInput.addEventListener("keydown", e => {
      if (e.key === "Enter") searchIdea();
    });

    categoryFilter.addEventListener("change", applyFilter);

    resetBtn.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "全部";
      visibleIds = new Set(ideas.map(i => i.id));
      resetStyles();
      network.unselectAll();
      network.fit({
        animation: { duration: 800, easingFunction: "easeInOutQuad" }
      });
      renderWelcome();
    });

    randomBtn.addEventListener("click", () => {
      const list = ideas.filter(i => visibleIds.has(i.id));
      const random = list[Math.floor(Math.random() * list.length)];
      if (random) openIdea(random.id);
    });

    closePanelBtn.addEventListener("click", () => {
      panel.classList.add("hidden");
      network.unselectAll();
      resetStyles();
    });

    network.once("stabilizationIterationsDone", function() {
      network.fit({
        animation: { duration: 900, easingFunction: "easeInOutQuad" }
      });
      renderWelcome();
    });
  </script>
